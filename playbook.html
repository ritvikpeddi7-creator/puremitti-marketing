<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3B4A34">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  :root{
    --paper:#EFE8DC; --card:#F7F2E8; --card-2:#F1EADC;
    --ink:#241E18; --ink-2:#544A3D; --ink-3:#7A6E5D;
    --green:#3B4A34; --green-2:#54654A; --terra:#B15A36; --ochre:#C6903C; --line:#D8CBB4;
    --t-ing:#3B4A34; --t-prod:#B15A36; --t-found:#C6903C; --t-fun:#3E6B63;
    --t-rev:#9B5A4A; --t-eco:#6E7B4D; --t-shop:#6B4A6B;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:"Avenir Next","Avenir","Segoe UI",system-ui,-apple-system,Helvetica,Arial,sans-serif;
    --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:var(--serif);font-weight:600;color:var(--green);margin:0;text-wrap:balance;line-height:1.14}
  p{margin:0}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--terra);margin:0 0 10px}
  .sitenav{position:sticky;top:0;z-index:50;background:rgba(239,232,220,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  .navwrap{max-width:820px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:9px}
  .brand::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--terra);display:inline-block}
  .navlinks{display:flex;gap:18px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase}
  .navlinks a{color:var(--ink-2);text-decoration:none;padding-bottom:4px;border-bottom:2px solid transparent;white-space:nowrap}
  .navlinks a.active{color:var(--terra);border-bottom-color:var(--terra)}
  @media(max-width:720px){.navlinks{gap:12px;font-size:10px}.navwrap{flex-wrap:wrap;row-gap:8px}}

  .hero{padding:34px 0 8px}
  .hero h1{font-size:clamp(28px,5vw,44px);letter-spacing:-.015em;color:var(--ink)}
  .hero .sub{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--green-2);margin-top:8px}

  /* Today box */
  .today{background:var(--green);color:#EFE7D4;border-radius:16px;padding:22px 24px;margin:22px 0 10px}
  .today .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#F0C88A;display:flex;justify-content:space-between;align-items:center}
  .today .lbl a{color:#CBBfA6;text-decoration:underline;font-size:10.5px;cursor:pointer}
  .today .dtitle{font-family:var(--serif);font-size:24px;color:#F5EFDF;margin:8px 0 4px}
  .today .type{font-family:var(--mono);font-size:11px;color:#E0C79A;text-transform:uppercase;letter-spacing:.05em}
  .today .film{font-size:17px;color:#F2ECDD;margin:14px 0 4px;line-height:1.45}
  .today .cap{font-family:var(--serif);font-size:16px;color:#DED5C0;line-height:1.5}
  .today .tags{font-family:var(--mono);font-size:12px;color:#B7C29A;margin-top:8px}
  .today .row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .today button{font-family:var(--mono);font-size:12px;letter-spacing:.03em;text-transform:uppercase;border-radius:9px;padding:10px 15px;cursor:pointer;border:none}
  .today .cp{background:#EFE7D4;color:#3B4A34}
  .today .done{background:transparent;color:#EFE7D4;border:1px solid #6E7B57}
  .today .done.on{background:#C6903C;color:#241E18;border-color:#C6903C}
  .today.complete .dtitle{font-size:20px}

  /* Progress */
  .progress{display:flex;align-items:center;gap:12px;margin:16px 0 6px}
  .progress .bar{flex:1;height:9px;background:var(--card-2);border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .progress .bar i{display:block;height:100%;background:var(--ochre);width:0;transition:width .25s ease}
  .progress .txt{font-family:var(--mono);font-size:11.5px;color:var(--ink-2);white-space:nowrap}

  .weekrow{margin:26px 0 12px;font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--terra);border-top:1px solid var(--line);padding-top:14px}
  .day{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:11px;border-left:5px solid var(--tc)}
  .day.posted{opacity:.62}
  .day.posted .film,.day.posted .cap{text-decoration:line-through;text-decoration-color:var(--ink-3)}
  .day .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px}
  .day .dn{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--tc);line-height:1}
  .day .dow{font-size:13.5px;color:var(--ink-3)}
  .day .type{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--tc);padding:3px 9px;border-radius:20px}
  .day .check{margin-left:auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .day .check input{width:17px;height:17px;accent-color:var(--t-eco);cursor:pointer}
  .day .line{display:flex;gap:9px;margin-bottom:6px;font-size:15px;line-height:1.5}
  .day .line .ic{flex-shrink:0;width:20px;text-align:center}
  .day .line.cap{color:var(--ink-2);font-family:var(--serif)}
  .day .tags{font-family:var(--mono);font-size:11.5px;color:var(--green-2);margin:4px 0 0;padding-left:29px}
  .day .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px;padding-left:29px}
  .day .cp{font-family:var(--mono);font-size:11px;letter-spacing:.03em;text-transform:uppercase;background:var(--card-2);border:1px solid var(--line);color:var(--green);border-radius:8px;padding:7px 12px;cursor:pointer}
  .day .cp:hover{border-color:var(--green)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--green);color:#F5EFDF;font-family:var(--mono);font-size:12.5px;letter-spacing:.03em;padding:11px 20px;border-radius:24px;opacity:0;pointer-events:none;transition:all .22s ease;z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .actions{display:flex;flex-wrap:wrap;gap:12px;margin:26px 0 6px}
  .actions a,.actions button{font-family:var(--mono);font-size:12px;letter-spacing:.03em;text-transform:uppercase;color:var(--green);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 15px;text-decoration:none;cursor:pointer}
  .actions a:hover,.actions button:hover{border-color:var(--green)}
  .foot{padding:22px 0 60px;color:var(--ink-3);font-size:12.5px;font-family:var(--mono)}
  @page{size:Letter;margin:13mm}
  @media print{*{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
    body{background:var(--paper) !important}
    .sitenav,.today,.progress,.day .check,.day .btns,.actions,.toast{display:none !important}
    .day{break-inside:avoid;opacity:1 !important}.day.posted .film,.day.posted .cap{text-decoration:none}.weekrow{break-after:avoid}}
</style>
</head>
<body>
<nav class="sitenav">
  <div class="navwrap">
    <a class="brand" href="index.html">Pure Mitti</a>

      <a href="index.html">Home</a>

<header class="hero">
  <div class="wrap">
    <div class="eyebrow">One video a day</div>
    <h1>Your video plan</h1>
    <div class="sub">Film the line. Post the caption. Tap done.</div>

</header>

<div class="wrap">
  <div class="today" id="today"></div>
  <div class="progress"><div class="bar"><i id="pbar"></i></div><div class="txt" id="ptxt">0 of 30 posted</div></div>
  <div class="actions">
    <a href="PureMitti_Simple_Plan.pdf" download>↓ Download plan (PDF)</a>
    <button id="installbtn" style="display:none">＋ Add to home screen</button>
  </div>

<main class="wrap" id="plan"></main>
<div class="foot wrap">Pure Mitti · Basking Ridge, NJ · Anything in [brackets] is a detail to fill in before posting.</div>
<div class="toast" id="toast">Copied</div>

<script>
const T = {"Ingredient tip":"--t-ing","Show a product":"--t-prod","Founder":"--t-found","Fun/trend":"--t-fun","Customer review":"--t-rev","Eco swap":"--t-eco","Shop/offer":"--t-shop","Soap-cutting (ASMR)":"--t-prod","Repost best video":"--t-found","Tease what's new":"--t-shop"};
const DAYS = [
 [1,"Mon","Ingredient tip","Hold up a bar and name one ingredient in it.","One ingredient, one story. This is what goes into your soap.","#PureMitti #IngredientSpotlight #AyurvedaInspired #NonToxicLiving"],
 [2,"Tue","Show a product","Slowly turn a soap bar in your hand so people see it up close.","Meet one of our best-sellers. Simple, honest, made by hand.","#PureMitti #HandmadeSoap #SmallBusiness #CleanBeauty"],
 [3,"Wed","Founder","Show Suniti pouring soap batter into a mold.","From ad exec to soap maker. This is how it all starts.","#PureMitti #FounderStory #SmallBusiness #HandmadeWithLove"],
 [4,"Thu","Fun/trend","Use a trending sound while stacking soap bars into a tower.","When you can't stop stacking soap. Anyone else?","#PureMitti #TrendingNow #HandmadeSoap #SmallBusiness"],
 [5,"Fri","Customer review","Show a customer review on your phone and read it out loud.","This made our whole week. Thank you for trusting us.","#PureMitti #CustomerLove #SmallBusiness #NonToxicLiving"],
 [6,"Sat","Eco swap","Put a plastic bottle next to a soap bar and point at the bar.","One easy swap: bottle to bar. Less plastic, same clean.","#PureMitti #EcoSwap #ZeroWaste #NonToxicLiving"],
 [7,"Sun","Shop/offer","Show your product shelf and point to the link in bio.","Ready to try Pure Mitti? Shop the collection — link in bio.","#PureMitti #ShopSmall #NaturalSkincare #SmallBusiness"],
 [8,"Mon","Ingredient tip","Hold up raw turmeric next to a turmeric soap bar.","Turmeric — an Ayurveda favorite. Traditionally used to soothe skin.","#PureMitti #Turmeric #AyurvedaInspired #IngredientSpotlight"],
 [9,"Tue","Soap-cutting (ASMR)","Slice a soap bar in half slowly so the sound and texture show.","That sound. That texture. Pure Mitti, cut fresh.","#PureMitti #ASMR #SoapCutting #HandmadeSoap"],
 [10,"Wed","Founder","Show Suniti writing labels by hand at her workbench.","Every label, hand-written by Suniti. Small details matter to us.","#PureMitti #FounderStory #HandmadeWithLove #SmallBusiness"],
 [11,"Thu","Fun/trend","Do a quick “things in my shower” trend showing your products.","Our shower shelf, unboxed. What's on yours?","#PureMitti #TrendingNow #NaturalSkincare #SmallBusiness"],
 [12,"Fri","Customer review","Film a 5-star review and smile at the camera.","Reviews like this keep us going. Thank you, truly.","#PureMitti #CustomerLove #SmallBusiness #HandmadeSoap"],
 [13,"Sat","Eco swap","Show a plastic sponge next to a natural cleaning cloth or bar.","Swap the sponge, keep the clean. Small change, real difference.","#PureMitti #EcoSwap #ZeroWaste #NonToxicLiving"],
 [14,"Sun","Shop/offer","Hold up a few products together and smile at the camera.","New week, fresh soap. Shop now — link in bio.","#PureMitti #ShopSmall #NaturalSkincare #SmallBusiness"],
 [15,"Mon","Ingredient tip","Hold up neem leaves next to a neem soap bar.","Neem — used in Ayurveda for ages. Traditionally used to soothe skin.","#PureMitti #Neem #AyurvedaInspired #IngredientSpotlight"],
 [16,"Tue","Show a product","Show your shampoo bar and how it lathers in hand.","One bar, no plastic bottle. Meet our shampoo bar.","#PureMitti #HandmadeSoap #NaturalHaircare #SmallBusiness"],
 [17,"Wed","Founder","Show Suniti packing an order box at her table.","Every order, packed with care. This one's headed out today.","#PureMitti #FounderStory #SmallBusiness #HandmadeWithLove"],
 [18,"Thu","Fun/trend","Use a trending “POV” sound while unboxing your own package.","POV: your Pure Mitti order just arrived. What would you try first?","#PureMitti #TrendingNow #SmallBusiness #CleanBeauty"],
 [19,"Fri","Customer review","Read a written customer comment out loud, hold the phone up.","We read every single review. This one made us smile.","#PureMitti #CustomerLove #SmallBusiness #NonToxicLiving"],
 [20,"Sat","Eco swap","Show a plastic lotion bottle next to a solid body bar.","Lotion bottle to solid bar. Same care, less waste.","#PureMitti #EcoSwap #ZeroWaste #NaturalSkincare"],
 [21,"Sun","Shop/offer","Show your best-selling products lined up on a table.","Our most-loved picks, in one place. Shop now — link in bio.","#PureMitti #ShopSmall #SmallBusiness #HandmadeSoap"],
 [22,"Mon","Ingredient tip","Hold up coconut oil next to a finished soap bar.","Coconut oil — simple and gentle. A key part of our soap.","#PureMitti #CoconutOil #IngredientSpotlight #NonToxicLiving"],
 [23,"Tue","Show a product","Spray your natural home-cleaning spray on a counter.","Clean counters, honest ingredients. Meet our home spray.","#PureMitti #NonToxicLiving #CleanHome #SmallBusiness"],
 [24,"Wed","Founder","Show Suniti stirring a batch of soap in a pot.","Small batches, made by hand. This is today's brew.","#PureMitti #FounderStory #HandmadeWithLove #SmallBusiness"],
 [25,"Thu","Fun/trend","Try a quick “rating my own products” trend on camera.","Rating our own soaps — be honest with us too. Your favorite?","#PureMitti #TrendingNow #SmallBusiness #HandmadeSoap"],
 [26,"Fri","Customer review","Show a customer photo or comment and react on camera.","Customers like you make Pure Mitti what it is. Thank you.","#PureMitti #CustomerLove #SmallBusiness #NaturalSkincare"],
 [27,"Sat","Eco swap","Show a paper or reusable bag next to plastic packaging.","Skip the plastic bag this week. One small swap counts.","#PureMitti #EcoSwap #ZeroWaste #NonToxicLiving"],
 [28,"Sun","Shop/offer","Show your full product lineup on a shelf, end with a smile.","Everything you need, in one shop. Shop now — link in bio.","#PureMitti #ShopSmall #SmallBusiness #HandmadeSoap"],
 [29,"Mon","Repost best video","Repost this month's best-performing video as is.","Our favorite from this month. In case you missed it.","#PureMitti #SmallBusiness #HandmadeSoap #CustomerLove"],
 [30,"Tue","Tease what's new","Film a close-up of a mystery box or covered product.","Something new is coming soon. Can you guess what it is?","#PureMitti #ComingSoon #SmallBusiness #NaturalSkincare"]
];

const store = {
  get posted(){ try{ return JSON.parse(localStorage.getItem("pm_posted")||"{}"); }catch(e){ return {}; } },
  set posted(v){ try{ localStorage.setItem("pm_posted", JSON.stringify(v)); }catch(e){} },
  get start(){
    let s = null; try{ s = localStorage.getItem("pm_start"); }catch(e){}
    if(!s){ s = todayStr(); try{ localStorage.setItem("pm_start", s); }catch(e){} }
    return s;
  },
  set start(v){ try{ localStorage.setItem("pm_start", v); }catch(e){} }
};
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function midnight(str){ const p=str.split("-"); return new Date(+p[0], +p[1]-1, +p[2]).getTime(); }
function todayIndex(){
  const idx = Math.floor((midnight(todayStr()) - midnight(store.start))/86400000) + 1;
  return idx;
}

let toastTimer;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1400);
}
function copy(text,label){
  const done=()=>toast((label||"Copied")+" ✓");
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(fallback); }
  else fallback();
  function fallback(){ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} ta.remove(); done(); }
}
function togglePosted(n){
  const p=store.posted; if(p[n]) delete p[n]; else p[n]=true; store.posted=p;
  render();
}
function tc(type){ return "var("+(T[type]||"--t-prod")+")"; }

function renderToday(){
  const box=document.getElementById("today");
  const idx=todayIndex();
  if(idx<1){ box.classList.add("complete"); box.innerHTML='<div class="lbl"><span>Your plan</span><a onclick="startToday()">Start today</a></div><div class="dtitle">Starts soon</div><div class="film">Tap “Start today” to begin on Day 1.</div>'; return; }
  if(idx>30){ box.classList.add("complete"); box.innerHTML='<div class="lbl"><span>Nice work</span><a onclick="startToday()">Restart plan</a></div><div class="dtitle">Month complete 🎉</div><div class="film">You finished all 30 days. Tap “Restart plan” to run it again.</div>'; return; }
  box.classList.remove("complete");
  const d=DAYS[idx-1]; const [n,dow,type,film,cap,tags]=d; const posted=!!store.posted[n];
  box.innerHTML =
    '<div class="lbl"><span>Post today · Day '+n+'</span><a onclick="startToday()">Reset start date</a></div>'+
    '<div class="dtitle">'+film+'</div>'+
    '<div class="type">'+type+'</div>'+
    '<div class="cap">✍️ '+cap+'</div>'+
    '<div class="tags">'+tags+'</div>'+
    '<div class="row">'+
      '<button class="cp" onclick="copy('+js(cap)+',\'Caption\')">Copy caption</button>'+
      '<button class="cp" onclick="copy('+js(tags)+',\'Hashtags\')">Copy hashtags</button>'+
      '<button class="done'+(posted?' on':'')+'" onclick="togglePosted('+n+')">'+(posted?'✓ Posted':'Mark posted')+'</button>'+
    '</div>';
}
function js(s){ return JSON.stringify(s); }

function renderList(){
  const main=document.getElementById("plan"); main.innerHTML="";
  const posted=store.posted;
  DAYS.forEach(d=>{
    const [n,dow,type,film,cap,tags]=d;
    if(n===1||n===8||n===15||n===22||n===29){
      const w=document.createElement("div"); w.className="weekrow";
      w.textContent = n===29 ? "Days 29–30 · wrap up" : ("Week "+((n-1)/7+1)); main.appendChild(w);
    }
    const el=document.createElement("div"); el.className="day"+(posted[n]?" posted":""); el.style.setProperty("--tc",tc(type));
    const check=document.createElement("label"); check.className="check";
    const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!posted[n];
    cb.addEventListener("change",()=>togglePosted(n));
    check.appendChild(cb); check.appendChild(document.createTextNode(posted[n]?"Posted":"Done?"));
    const top=document.createElement("div"); top.className="top";
    top.innerHTML='<span class="dn">Day '+n+'</span><span class="dow">'+dow+'</span><span class="type">'+type+'</span>';
    top.appendChild(check);
    el.appendChild(top);
    const body=document.createElement("div");
    body.innerHTML='<div class="line film"><span class="ic">🎥</span><span><b>Film:</b> '+film+'</span></div>'+
      '<div class="line cap"><span class="ic">✍️</span><span>'+cap+'</span></div>'+
      '<div class="tags">'+tags+'</div>';
    el.appendChild(body);
    const btns=document.createElement("div"); btns.className="btns";
    const b1=document.createElement("button"); b1.className="cp"; b1.textContent="Copy caption"; b1.onclick=()=>copy(cap,"Caption");
    const b2=document.createElement("button"); b2.className="cp"; b2.textContent="Copy hashtags"; b2.onclick=()=>copy(tags,"Hashtags");
    btns.appendChild(b1); btns.appendChild(b2); el.appendChild(btns);
    main.appendChild(el);
  });
}
function renderProgress(){
  const count=Object.keys(store.posted).length;
  document.getElementById("pbar").style.width=Math.round(count/30*100)+"%";
  document.getElementById("ptxt").textContent=count+" of 30 posted";
}
function render(){ renderToday(); renderList(); renderProgress(); }
function startToday(){ store.start=todayStr(); render(); toast("Start date set to today ✓"); }

// Add to home screen (Android/Chrome)
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{ e.preventDefault(); deferredPrompt=e; const b=document.getElementById("installbtn"); b.style.display="inline-block"; b.onclick=async()=>{ b.style.display="none"; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; }; });

render();
</script>
</body>
</html>
